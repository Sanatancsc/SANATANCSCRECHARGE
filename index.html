<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanatan Super Pay </title>
    <style>
        :root { --primary: #FF4500; --secondary: #FF8C00; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff5e6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 360px; border-top: 5px solid var(--primary); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 20px; font-size: 22px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { font-size: 13px; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; font-size: 15px; }
        .recharge-btn { width: 100%; padding: 14px; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .recharge-btn:hover { transform: scale(1.02); opacity: 0.9; }
        
        /* PIN Modal Styling */
        #pinModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(3px); }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 300px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-top: 0; font-size: 18px; color: #333; }
        .pin-input { text-align: center; font-size: 24px; letter-spacing: 8px; font-weight: bold; border: 2px solid var(--primary) !important; margin: 15px 0; }
        .modal-btns { display: flex; gap: 10px; }
        .btn-confirm { flex: 1; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-cancel { flex: 1; padding: 12px; background: #666; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #res { margin-top: 15px; padding: 12px; border-radius: 8px; display: none; font-size: 13px; border-left: 5px solid transparent; line-height: 1.6; }
        .SUCCESS { background: #d4edda; color: #155724; border-left-color: #28a745; }
        .FAILED { background: #f8d7da; color: #721c24; border-left-color: #dc3545; }
        .PENDING { background: #fff3cd; color: #856404; border-left-color: #ffc107; }
        .status-btn { background: #000; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-top: 5px; font-size: 11px; }
    </style>
</head>
<body>

<div class="card">
    <h2> Sanatan Super Pay Demo</h2>
    
    <label>Mobile Number</label>
    <input type="tel" id="mobile" placeholder="Enter 10 digit number" maxlength="10">

    <label>Select Operator</label>
    <select id="opt">
        <option value="">-- Choose Operator --</option>
        <option value="1">Airtel</option>
        <option value="2">Idea</option>
        <option value="3">Vodafone</option>
        <option value="4">Jio</option>
        <option value="5">Bsnl Special</option>
        <option value="6">Bsnl Topup</option>
    </select>

    <label>Amount (₹)</label>
    <input type="number" id="amount" placeholder="Enter Amount">

    <button class="recharge-btn" onclick="openPinModal()">Recharge Now</button>
    
    <div id="res"></div>
</div>

<div id="pinModal">
    <div class="modal-content">
        <h3>🔒 Enter 5-Digit PIN</h3>
        <p id="summaryText" style="font-size: 12px; color: #666;"></p>
        <input type="password" id="txnPin" class="pin-input" maxlength="6" placeholder="******" inputmode="numeric">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-confirm" onclick="doRecharge()">Verify & Pay</button>
        </div>
    </div>
</div>

<script>
    function openPinModal() {
        const mobile = document.getElementById('mobile').value;
        const opt = document.getElementById('opt').value;
        const amount = document.getElementById('amount').value;

        if (!mobile || !opt || !amount) {
            alert("Sabhi details bharna anivarya hai!");
            return;
        }

        if(mobile.length < 10) {
            alert("Sahi mobile number dalein!");
            return;
        }

        document.getElementById('summaryText').innerText = `Recharge ₹${amount} for ${mobile}`;
        document.getElementById('txnPin').value = ""; // Reset PIN field
        document.getElementById('pinModal').style.display = "flex";
        document.getElementById('txnPin').focus();
    }

    function closeModal() {
        document.getElementById('pinModal').style.display = "none";
    }

    async function doRecharge() {
        const pin = document.getElementById('txnPin').value;
        if (pin.length < 6) {
            alert("Enter 5-digit PIN !");
            return;
        }

        closeModal(); // Popup band karein

        const resDiv = document.getElementById('res');
        const btn = document.querySelector('.recharge-btn');
        
        const mobile = document.getElementById('mobile').value;
        const opt = document.getElementById('opt').value;
        const amount = document.getElementById('amount').value;

        resDiv.style.display = "block";
        resDiv.className = ""; 
        resDiv.innerHTML = "Verifying PIN & Processing...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/recharge', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mobile, opt, amount, pin })
            });
            const data = await response.json();
            
            resDiv.className = data.Status; 
            resDiv.innerHTML = `<strong>Result: ${data.Status}</strong><br>${data.MSG || ''}<br>Order ID: ${data.AgentID || 'N/A'}`;

            // Agar Pending hai toh status button dikhao
            if(data.Status === "PENDING") {
                resDiv.innerHTML += `<br><button class="status-btn" onclick="checkStatus('${data.AgentID}')">Check Status</button>`;
            }
        } catch (e) {
            resDiv.className = "FAILED";
            resDiv.innerHTML = "Server se sampark nahi ho paya.";
        } finally {
            btn.disabled = false;
        }
    }

    async function checkStatus(agentId) {
        const resDiv = document.getElementById('res');
        resDiv.innerHTML = "Updating status...";
        try {
            const response = await fetch(`/api/status?agentid=${agentId}`);
            const data = await response.json();
            resDiv.className = data.Status;
            resDiv.innerHTML = `<strong>Updated Status: ${data.Status}</strong><br>${data.MSG}<br>OPID: ${data.OPID || 'N/A'}`;
        } catch (e) {
            alert("Status check failed!");
        }
    }
</script>
</body>
</html>
